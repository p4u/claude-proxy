name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Go version is read from go.mod via `go-version-file` on actions/setup-go,
# so there is nothing to keep in sync here.

jobs:
  # ----------------------------------------------------------------------------
  # Static analysis: gofmt, go vet, golangci-lint.
  # ----------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      # Install golangci-lint v2 directly via `go install` to dodge the
      # golangci-lint-action quirk where some action versions hardcode the v1
      # module path. Compiling here uses the Go toolchain set up above
      # (= go.mod's directive), so the linter binary targets the same Go
      # version the module declares.
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: golangci-lint
        run: golangci-lint run --timeout=5m

  # ----------------------------------------------------------------------------
  # Unit + integration tests with race detector and coverage.
  # ----------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Test (race + coverage)
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -n 1

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage.out
          retention-days: 14

  # ----------------------------------------------------------------------------
  # Build & publish the multi-arch docker image to GHCR.
  #
  # Strategy: build each arch on a native runner (no QEMU), push each platform
  # by digest, then merge into a multi-arch manifest list in a final job.
  # Cache scopes are per-arch and per-image so they never collide.
  #
  # Runs only on push to main and on semver tags. Pull-request builds are
  # skipped to avoid leaking the registry token to forks.
  # ----------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.platform }})
    needs: [lint, test]
    if: github.event_name == 'push'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image (by digest)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=image-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=image-${{ matrix.arch }}
          provenance: false

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digests
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ----------------------------------------------------------------------------
  # Merge per-arch digests into final multi-arch manifest lists.
  # ----------------------------------------------------------------------------
  merge:
    name: Merge manifests
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=claude-proxy
            org.opencontainers.image.description=Sticky multi-subscription HTTP proxy for Claude Code
            org.opencontainers.image.licenses=AGPL-3.0-only

      - name: Create manifest list
        working-directory: /tmp/digests
        run: |
          tags=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< '${{ steps.meta.outputs.json }}')
          sources=$(ls | sed "s|^|${IMAGE}@sha256:|")
          docker buildx imagetools create $tags $sources

      - name: Image summary
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "## Published images"
            while IFS= read -r t; do
              [ -n "$t" ] && echo "- \`$t\`"
            done <<< "$TAGS"
          } >> "$GITHUB_STEP_SUMMARY"

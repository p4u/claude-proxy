services:
  claude-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-proxy:latest
    container_name: claude-proxy
    restart: unless-stopped
    # Run as the host user so bind-mounted ./data is writable.
    user: "${PROXY_UID:-1000}:${PROXY_GID:-1000}"
    env_file:
      - .env
    environment:
      # Read by the binary at startup. Empty disables downstream auth.
      CLAUDE_PROXY_AUTH_TOKEN: "${PROXY_AUTH_TOKEN:-}"
    ports:
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT:-8787}:8787"
    volumes:
      # SQLite database + WAL files persist across restarts.
      - ./data:/data
      # Drop your .credentials.json files here, then run:
      #   docker compose run --rm claude-proxy creds import \
      #       --from /creds/acct-A.json --label acct-A --db /data/proxy.db
      - ./creds:/creds:ro
    command:
      - "serve"
      - "--addr"
      - "0.0.0.0:8787"
      - "--db"
      - "/data/proxy.db"
      - "--log-level"
      - "${LOG_LEVEL:-info}"
      - "--log-format"
      - "${LOG_FORMAT:-auto}"
      - "--log-color"
      - "${LOG_COLOR:-auto}"
    healthcheck:
      test: ["CMD", "/usr/local/bin/claude-proxy", "creds", "list", "--db", "/data/proxy.db"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

services:
  claude-proxy:
    # Default to the published GHCR image so users don't need a Go toolchain.
    # Override the tag with CLAUDE_PROXY_IMAGE in .env (e.g. to pin a version
    # like ghcr.io/p4u/claude-proxy:v0.2.0). The `build:` directive below makes
    # `docker compose build` (or `make build`) work for source-tree development.
    image: ${CLAUDE_PROXY_IMAGE:-ghcr.io/p4u/claude-proxy:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claude-proxy
    restart: unless-stopped
    user: "${PROXY_UID:-65532}:${PROXY_GID:-65532}"
    env_file:
      - .env
    environment:
      # Auth token — read by the binary at startup. Empty disables auth.
      CLAUDE_PROXY_AUTH_TOKEN: "${PROXY_AUTH_TOKEN:-}"
      # Agent bridge — only used when claude CLI is present in the image.
      ENABLE_API_BRIDGE: "${ENABLE_API_BRIDGE:-true}"
      AGENT_IDLE_TTL: "${AGENT_IDLE_TTL:-10m}"
      AGENT_MAX_SESSIONS: "${AGENT_MAX_SESSIONS:-32}"
      AGENT_TOOLS: "${AGENT_TOOLS:-Read,Grep,Glob,WebFetch}"
    ports:
      # When traefik is active (profile=tls), keep this on 127.0.0.1 — traefik
      # reaches the container over the docker network, no host port needed.
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT:-8787}:8787"
    volumes:
      - ./data:/data
      - ./creds:/creds:ro
      # Persist claude CLI session state (oauth tokens, session UUIDs) across
      # container restarts so agent sessions survive image upgrades.
      - claude-home:/home/claude/.claude
    command:
      - "serve"
      - "--addr"
      - "0.0.0.0:8787"
      - "--db"
      - "/data/proxy.db"
      - "--log-level"
      - "${LOG_LEVEL:-info}"
      - "--log-format"
      - "${LOG_FORMAT:-auto}"
      - "--log-color"
      - "${LOG_COLOR:-auto}"
    healthcheck:
      test: ["CMD", "/usr/local/bin/claude-proxy", "creds", "list", "--db", "/data/proxy.db"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    labels:
      # Traefik routes to this container only when the `tls` profile is active.
      # When traefik isn't running, these labels are harmless.
      - "traefik.enable=true"
      - "traefik.docker.network=claude-proxy_default"
      - "traefik.http.routers.claude-proxy.rule=Host(`${TLS_DOMAIN:-claude-proxy.invalid}`)"
      - "traefik.http.routers.claude-proxy.entrypoints=websecure"
      - "traefik.http.routers.claude-proxy.tls=true"
      - "traefik.http.routers.claude-proxy.tls.certresolver=le"
      - "traefik.http.services.claude-proxy.loadbalancer.server.port=8787"

  traefik:
    image: traefik:latest
    container_name: claude-proxy-traefik
    restart: unless-stopped
    # Activated only when COMPOSE_PROFILES contains "tls" (the Makefile sets
    # this automatically whenever TLS_DOMAIN is non-empty in .env).
    profiles:
      - tls
    depends_on:
      - claude-proxy
    command:
      - "--log.level=${TRAEFIK_LOG_LEVEL:-INFO}"
      - "--accesslog=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=claude-proxy_default"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.tlschallenge=true"
      - "--certificatesresolvers.le.acme.email=${TLS_EMAIL}"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro

  watchtower:
    image: containrrr/watchtower:1.7.1
    container_name: claude-proxy-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: claude-proxy --interval 300
    environment:
      WATCHTOWER_CLEANUP: "true"

volumes:
  # Named volume for claude CLI state: credentials, session UUIDs.
  # Survives `docker compose down` (use `docker compose down -v` to wipe).
  claude-home:

# golangci-lint configuration for claude-proxy.
# v2 schema (golangci-lint >= 2.0).
version: "2"

run:
  timeout: 5m

linters:
  default: standard
  exclusions:
    rules:
      # Test files: writes to httptest.ResponseRecorder cannot fail in any
      # interesting way, and treating them as errors clutters tests.
      - path: _test\.go
        linters: [errcheck]
      # Canonical fire-and-forget patterns where the error is not actionable.
      - linters: [errcheck]
        text: 'Error return value of `.*\.Close` is not checked'
      - linters: [errcheck]
        text: 'Error return value of `fmt\.Fprint(f|ln)?` is not checked'
      - linters: [errcheck]
        text: 'Error return value of `tx\.Rollback` is not checked'
